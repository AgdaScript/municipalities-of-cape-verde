openapi: 3.0.3
info:
  title: Cape Verde Municipalities API
  description: |
    REST API for querying islands, municipalities, zones and streets of Cape Verde.
    Path parameter names accept variations with or without accents
    (e.g. "Sao Vicente" or "São Vicente").
  version: 1.0.0
  contact:
    name: Cape Verde Municipalities API

servers:
  - url: https://municipalities-of-cape-verde.vercel.app
    description: Production (Vercel)

tags:
  - name: Islands
    description: Operations related to islands
  - name: Municipalities
    description: Operations related to municipalities
  - name: Zones
    description: Operations related to zones
  - name: Streets
    description: Operations related to streets

paths:
  /cabo-verde:
    get:
      tags:
        - Islands
      summary: Get full hierarchy
      description: Returns the complete data structure with all islands, municipalities, zones and streets
      operationId: getCaboVerde
      responses:
        '200':
          description: Full Cape Verde hierarchy returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  islands:
                    type: object

  /islands:
    get:
      tags:
        - Islands
      summary: List all islands
      description: Returns the list of all Cape Verde islands
      operationId: getIslands
      responses:
        '200':
          description: Island list returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  islands:
                    type: array
                    items:
                      type: string
              example:
                islands:
                  - Santiago
                  - São Vicente
                  - Sal
                  - Boa Vista
                  - Maio
                  - Fogo
                  - Brava
                  - Santo Antão
                  - Nicolau

  /islands/{island}/municipalities:
    get:
      tags:
        - Municipalities
      summary: List municipalities of an island
      description: Returns the municipalities of the specified island
      operationId: getMunicipalities
      parameters:
        - name: island
          in: path
          required: true
          description: "Island name (e.g. Santiago, São Vicente, Sal)"
          schema:
            type: string
            example: Santiago
      responses:
        '200':
          description: Municipality list returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  municipalities:
                    type: array
                    items:
                      type: string
              example:
                municipalities:
                  - Praia
                  - Santa Catarina
                  - Santa Cruz
                  - São Domingos
                  - São Lourenço dos Órgãos
                  - São Miguel
                  - Tarrafal
        '404':
          description: Island not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string

  /islands/{island}:
    get:
      tags:
        - Islands
      summary: Get island with all children
      description: Returns the island with all its municipalities, zones and streets
      operationId: getIslandWithChildren
      parameters:
        - name: island
          in: path
          required: true
          description: Island name
          schema:
            type: string
            example: Santiago
      responses:
        '200':
          description: Island with full hierarchy returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  island:
                    type: string
                  municipalities:
                    type: object
        '404':
          description: Island not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string

  /islands/{island}/municipalities/{municipality}:
    get:
      tags:
        - Municipalities
      summary: Get municipality with all children
      description: Returns the municipality with all its zones and streets
      operationId: getMunicipalityWithChildren
      parameters:
        - name: island
          in: path
          required: true
          description: Island name
          schema:
            type: string
            example: Santiago
        - name: municipality
          in: path
          required: true
          description: Municipality name
          schema:
            type: string
            example: Praia
      responses:
        '200':
          description: Municipality with full hierarchy returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  municipality:
                    type: string
                  zones:
                    type: object
        '404':
          description: Island or municipality not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string

  /islands/{island}/municipalities/{municipality}/zones:
    get:
      tags:
        - Zones
      summary: List zones of a municipality
      description: Returns the zones of the specified municipality
      operationId: getZones
      parameters:
        - name: island
          in: path
          required: true
          description: Island name
          schema:
            type: string
            example: Santiago
        - name: municipality
          in: path
          required: true
          description: Municipality name
          schema:
            type: string
            example: Praia
      responses:
        '200':
          description: Zone list returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  zones:
                    type: array
                    items:
                      type: string
              example:
                zones:
                  - Achada Santo António
                  - Achada Grande
                  - Plateau
                  - Palmarejo
        '404':
          description: Island or municipality not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string

  /islands/{island}/municipalities/{municipality}/zones/{zone}/streets:
    get:
      tags:
        - Streets
      summary: List streets of a zone
      description: |
        Returns the streets of the specified zone.
        **Note:** Street data is not available in the current JSON.
        This endpoint returns an empty array and is prepared for future expansion.
      operationId: getStreets
      parameters:
        - name: island
          in: path
          required: true
          description: Island name
          schema:
            type: string
            example: Santiago
        - name: municipality
          in: path
          required: true
          description: Municipality name
          schema:
            type: string
            example: Praia
        - name: zone
          in: path
          required: true
          description: Zone name
          schema:
            type: string
            example: Plateau
      responses:
        '200':
          description: Street list (empty - data not available)
          content:
            application/json:
              schema:
                type: object
                properties:
                  streets:
                    type: array
                    items:
                      type: string
              example:
                streets: []
        '404':
          description: Island, municipality or zone not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  message:
                    type: string

